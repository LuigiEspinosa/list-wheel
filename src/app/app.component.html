<main class="layout">
  <header class="header">
    <h1>Cuatro Wheel</h1>
    <p>Load and update a .txt file (one entry per line), shuffle, and spin.</p>
  </header>

  <section class="panel">
    <app-controls (spin)="onSpinRequested()"></app-controls>
    <div id="winner-live" aria-live="polite" class="sr-only"></div>
  </section>

  <section class="wheel-wrap">
    <app-wheel-svg></app-wheel-svg>
  </section>
</main>
