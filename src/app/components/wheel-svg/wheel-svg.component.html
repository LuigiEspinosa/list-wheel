<div class="wheel-wrap">
  <svg class="wheel" viewBox="-50 -50 100 100" role="img" aria-label="Wheel of entries">
    <g [attr.transform]="'rotate(' + angleDeg() + ')'">
      <circle r="48" fill="#2a1f47"></circle>
      <circle r="40" fill="#1f1633"></circle>

      <g stroke="#362d59" stroke-width="0.2">
        @for (i of labelIndices(); track i; let idx = $index) {
        <line [attr.x1]="0" [attr.y1]="0" [attr.x2]="48 * Math.cos(i * step())" [attr.y2]="48 * Math.sin(i * step())" />
        }
      </g>

      <circle r="48" fill="none" stroke="#6a5fc1" stroke-width="0.8"></circle>

      <g fill="#ffffff" font-family="Rubik, system-ui, sans-serif" dominant-baseline="middle">
        @for (i of labelIndices(); track i; let idx = $index) {
        <g [attr.transform]="'rotate(' + ((i + 0.5) * step() * 180/Math.PI) + ') translate(' + rStart + ' 0)'">
          <text text-anchor="start" [attr.font-size]="labelFontSize(step())">
            {{ radialLabel(i) }}
          </text>
        </g>
        }
      </g>
    </g>

    <polygon points="-3,-49 0,-44 3,-49" fill="#c2ef4e" />
    <circle r="3" fill="#422082"></circle>

    @if (svc.lastWinner()) {
    <foreignObject x="-30" y="-16" width="60" height="32" class="winner-fo">
      <div xmlns="http://www.w3.org/1999/xhtml" class="winner-badge" [attr.data-size]="winnerSize()" role="status">
        <div class="winner-badge__label">Winner</div>
        <div class="winner-badge__name">{{ svc.lastWinner() }}</div>
      </div>
    </foreignObject>
    }
  </svg>
</div>
